server:
  port: 8083

spring:
  application:
    name: WALLET-ACCOUNT-SERVICE

  datasource:
    url: jdbc:postgresql://localhost:5432/account_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: localhost:9092   # ⭐ VERY IMPORTANT

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka