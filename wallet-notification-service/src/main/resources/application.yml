server:
  port: 8086

spring:
  application:
    name: wallet-notification-service

  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      group-id: wallet-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: com.wallet.wallet_notification_server.dto.TransactionEvent
        spring.json.trusted.packages: "*"
      # Prevent infinite retries on errors
      enable-auto-commit: true
      auto-commit-interval: 1000
      max-poll-records: 10

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    enabled: false  # Disable Eureka for notification service as it doesn't need to be discovered

# Logging Configuration
logging:
  level:
    root: INFO
    com.wallet: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
